version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: hand-redis
    ports:
      - "6379:6379"

  tracking-service:
    build: .
    container_name: hand-tracking-svc
    ports:
      - "50051:50051"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis